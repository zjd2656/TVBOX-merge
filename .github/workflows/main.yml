name: updata

on:
  schedule:
    - cron: "0 21 * * *"  # 每天 UTC 21:00 (北京时间 5:00)
    - cron: "0 9 * * *"   # 每天 UTC 9:00 (北京时间 17:00)
  workflow_dispatch:  # 允许手动触发
  push:
    branches: [ main ]

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 授予写入权限
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITB_TOKEN}}
          fetch-depth: 0
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: 运行合并脚本
        env:
         GITB_TOKEN: ${{secrets.GITB_TOKEN }}
         GITHUB_REPO: ${{ github.repository }}
         GITHUB_BRANCH: ${{ github.ref_name }}
        run: |
          echo "开始执行合并脚本..."
          python merge_sites.py
      
      - name: 提交并推送更改
        if: success()
        run: |
          echo "检查文件变更..."
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 检查 青龙.json 是否有变化
          if git diff --name-only | grep -q "青龙.json"; then
            echo "检测到 青龙.json 有变更，准备提交"
            git add 青龙.json
            git commit -m "🔄 自动更新站点配置 [$(date +'%Y-%m-%d %H:%M:%S')]"
            git push origin${{ github.ref_name }}
            echo "✅ 已提交并推送变更"
          else
            echo "没有检测到变更，跳过提交"
          fi
